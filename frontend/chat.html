<!DOCTYPE html>
<html lang="en">
<head>
<title>For Us</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="app.js" defer></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0d0d0d;
    --ink-soft: #111111;
    --ink-card: #161616;
    --ink-hover: #1e1e1e;
    --paper: #f5f0e8;
    --accent: #c8976a;
    --accent-hover: #d9a87a;
    --muted: #6b6560;
    --rule: rgba(200,151,106,0.15);
    --error: #e07070;
    --success: #7ab87a;
    --mine-bg: #c8976a;
    --theirs-bg: #1e1e1e;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--ink);
    color: var(--paper);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Nav ── */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    background: rgba(13,13,13,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--rule);
    flex-shrink: 0;
    z-index: 100;
  }

  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    text-decoration: none;
  }

  .nav-right { display: flex; align-items: center; gap: 16px; }

  .nav-user { font-size: 13px; color: var(--muted); }
  .nav-user span { color: var(--paper); font-weight: 500; }

  .btn-nav {
    position: relative;
    padding: 7px 14px;
    background: transparent;
    border: 1px solid var(--rule);
    border-radius: 3px;
    color: var(--paper);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 0.06em;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 7px;
    transition: border-color 0.2s, color 0.2s;
  }

  .btn-nav:hover { border-color: var(--accent); color: var(--accent); }

  .btn-logout { color: var(--muted); }
  .btn-logout:hover { border-color: var(--error); color: var(--error); }

  #pending-badge {
    display: none;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    background: var(--accent);
    color: var(--ink);
    border-radius: 50%;
    font-size: 9px;
    font-weight: 700;
  }

  /* ── Main layout ── */
  .chat-layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--rule);
    background: var(--ink-soft);
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--rule);
    flex-shrink: 0;
  }

  .sidebar-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 2px;
  }

  .sidebar-header p {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  #contacts {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  #contacts::-webkit-scrollbar { width: 4px; }
  #contacts::-webkit-scrollbar-track { background: transparent; }
  #contacts::-webkit-scrollbar-thumb { background: rgba(200,151,106,0.2); border-radius: 2px; }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .contact-item:hover { background: var(--ink-hover); }
  .contact-item.active { background: rgba(200,151,106,0.08); border-right: 2px solid var(--accent); }

  .contact-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #a0705a);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--ink);
    flex-shrink: 0;
    position: relative;
  }

  .online-dot {
    position: absolute;
    bottom: 1px;
    right: 1px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--muted);
    border: 2px solid var(--ink-soft);
    transition: background 0.3s;
  }

  .online-dot.online { background: var(--success); }

  .contact-info { flex: 1; min-width: 0; }

  .contact-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--paper);
    display: block;
  }

  .unread-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 20px;
    height: 20px;
    padding: 0 5px;
    background: var(--accent);
    color: var(--ink);
    border-radius: 10px;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .contacts-empty {
    padding: 32px 20px;
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    line-height: 1.8;
  }

  .contacts-empty a {
    color: var(--accent);
    text-decoration: none;
  }

  /* ── Chat area ── */
  .chat-area {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--ink);
  }

  /* Empty state */
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
  }

  .empty-icon {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-style: italic;
    color: rgba(200,151,106,0.2);
  }

  .empty-text {
    font-size: 14px;
    font-weight: 300;
  }

  /* Chat panel */
  #chat-panel {
    display: none;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }

  /* Chat header */
  .chat-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--rule);
    background: rgba(13,13,13,0.6);
    flex-shrink: 0;
  }

  #chat-header-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #a0705a);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--ink);
    flex-shrink: 0;
  }

  #chat-header-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--paper);
  }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: rgba(200,151,106,0.15); border-radius: 2px; }

  .msg-loading, .msg-empty {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    margin: auto;
    font-style: italic;
  }

  /* Bubbles */
  .bubble {
    display: flex;
    flex-direction: column;
    max-width: 65%;
    animation: bubbleIn 0.2s ease;
  }

  @keyframes bubbleIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .bubble.mine {
    align-self: flex-end;
    align-items: flex-end;
  }

  .bubble.theirs {
    align-self: flex-start;
    align-items: flex-start;
  }

  .bubble-content {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    font-weight: 300;
    line-height: 1.5;
    word-break: break-word;
  }

  .bubble.mine .bubble-content {
    background: var(--mine-bg);
    color: var(--ink);
    border-bottom-right-radius: 4px;
  }

  .bubble.theirs .bubble-content {
    background: var(--theirs-bg);
    color: var(--paper);
    border-bottom-left-radius: 4px;
    border: 1px solid rgba(245,240,232,0.06);
  }

  .bubble-time {
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
    padding: 0 4px;
  }

  /* Input area */
  .chat-input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--rule);
    display: flex;
    align-items: flex-end;
    gap: 12px;
    background: rgba(13,13,13,0.6);
    flex-shrink: 0;
  }

  #message-input {
    flex: 1;
    padding: 12px 16px;
    background: rgba(245,240,232,0.05);
    border: 1px solid rgba(245,240,232,0.10);
    border-radius: 20px;
    color: var(--paper);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 300;
    outline: none;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s, background 0.2s;
  }

  #message-input::placeholder { color: rgba(245,240,232,0.2); }
  #message-input:focus {
    border-color: var(--accent);
    background: rgba(200,151,106,0.05);
  }

  .btn-send {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: var(--ink);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.15s;
  }

  .btn-send:hover { background: var(--accent-hover); }
  .btn-send:active { transform: scale(0.93); }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 12px 20px;
    background: var(--ink-card);
    border: 1px solid var(--rule);
    border-radius: 4px;
    font-size: 13px;
    color: var(--paper);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    transform: translateY(12px);
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 999;
  }

  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-color: rgba(122,184,122,0.4); color: var(--success); }
  .toast.error   { border-color: rgba(224,112,112,0.4); color: var(--error); }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .chat-layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .sidebar.show { display: flex; position: fixed; inset: 56px 0 0 0; z-index: 50; width: 100%; }
  }
</style>
</head>

<body>

  <!-- Nav -->
  <nav class="nav">
    <a href="chat.html" class="nav-logo">For Us</a>
    <div class="nav-right">
      <span class="nav-user">Hi, <span id="nav-username">—</span></span>
      <a href="people.html" class="btn-nav">
        People
        <span id="pending-badge">0</span>
      </a>
      <button class="btn-nav btn-logout" onclick="logout()">Sign out</button>
    </div>
  </nav>

  <!-- Layout -->
  <div class="chat-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Messages</h2>
        <p>Your conversations</p>
      </div>
      <div id="contacts">
        <div class="contacts-empty">Loading…</div>
      </div>
    </aside>

    <!-- Chat area -->
    <div class="chat-area">

      <!-- Empty state -->
      <div id="empty-state">
        <span class="empty-icon">✦</span>
        <span class="empty-text">Select a conversation to begin</span>
      </div>

      <!-- Active chat -->
      <div id="chat-panel">
        <div class="chat-header">
          <div id="chat-header-avatar">—</div>
          <span id="chat-header-name">—</span>
        </div>

        <div id="messages"></div>

        <div class="chat-input-area">
          <textarea
            id="message-input"
            placeholder="Write something…"
            rows="1"
            oninput="autoResize(this)"
            onkeydown="handleKey(event)"
          ></textarea>
          <button class="btn-send" onclick="sendMessage()">→</button>
        </div>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // Redirect if not logged in
    if (!localStorage.getItem('token')) {
      window.location.href = 'login.html'
    }

    function initUsername() {
      try {
        const payload = JSON.parse(atob(getToken().split('.')[1]))
        if (payload.username)
          document.getElementById('nav-username').textContent = payload.username
      } catch(e) {}
    }

    // Auto resize textarea
    function autoResize(el) {
      el.style.height = 'auto'
      el.style.height = Math.min(el.scrollHeight, 120) + 'px'
    }

    // Send on Enter, new line on Shift+Enter
    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault()
        sendMessage()
      }
    }

    initUsername()

    window.addEventListener('load', () => {
      initSocket()
      loadContacts()
      loadPendingBadge()
    })
  </script>

</body>
</html>
